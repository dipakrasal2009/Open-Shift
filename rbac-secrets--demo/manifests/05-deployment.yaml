apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-secrets-demo
  namespace: rbac-secrets-demo
  labels:
    app: rbac-secrets-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-secrets-demo
  template:
    metadata:
      labels:
        app: rbac-secrets-demo
    spec:
      serviceAccountName: rbac-demo-sa
      containers:
        - name: rbac-secrets-demo
          image: <YOUR_REGISTRY>/rbac-secrets-demo:latest
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: password
